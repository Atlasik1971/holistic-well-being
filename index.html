    <script type="text/javascript">
      // Декодер для SPA-fallback (см. public/404.html).
      // GitHub Pages не умеет hash-less маршруты по умолчанию: 404.html переписывает
      // адрес в /?/path, а здесь мы возвращаем нормальный URL без перезагрузки.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
