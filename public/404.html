<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Перенаправление…</title>
    <meta name="robots" content="noindex" />
    <script type="text/javascript">
      // SPA fallback для GitHub Pages.
      // Подменяем «настоящие» URL вроде /holistic-well-being/reviews
      // на /holistic-well-being/?/reviews, который уже умеет обработать index.html.
      // Подход Rafrex: https://github.com/rafgraph/spa-github-pages
      (function () {
        var pathSegmentsToKeep = 1; // оставляем "/holistic-well-being"
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + pathSegmentsToKeep)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(pathSegmentsToKeep)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
